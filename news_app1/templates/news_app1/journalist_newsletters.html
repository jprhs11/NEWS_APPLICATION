{% extends 'news_app1/base.html' %}

{% block content %}
<div style="max-width: 900px; margin: 40px auto; font-family: sans-serif;">
    <header
        style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #9b59b6; padding-bottom: 10px; margin-bottom: 30px;">
        <h2 style="color: #2c3e50; margin: 0;">My Newsletters</h2>
        <a href="{% url 'create_newsletter' %}"
            style="background: #9b59b6; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold;">
            + Create New
        </a>
    </header>

    {% for newsletter in newsletters %}
    <div style="background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px;">
        <h3 style="margin-top: 0; color: #8e44ad;">{{ newsletter.title }}</h3>
        <div style="margin-top: 15px; display: flex; gap: 15px;">
            <a href="{% url 'edit_newsletter' newsletter.id %}"
                style="color: #f39c12; text-decoration: none; font-weight: bold;">Edit</a>
            <form action="{% url 'delete_newsletter' newsletter.id %}" method="post"
                onsubmit="return confirm('Delete your newsletter?');">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: #e74c3c; font-weight: bold; cursor: pointer;">Delete</button>
            </form>
        </div>
    </div>
    {% empty %}
    <p>You haven't created any newsletters yet.</p>
    {% endfor %}
</div>
{% endblock %}
